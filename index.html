<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APAVAN - Dose Controlada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .btn-confirm {
            min-height: 48px;
            transition: all 0.2s ease;
        }

        .btn-confirm:active {
            transform: scale(0.96);
        }

        .card-med {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .freq-btn.active {
            background-color: #facc15 !important;
            color: #000 !important;
            border-color: #eab308 !important;
        }

        .med-group-header {
            border-left: 8px solid #facc15;
        }

        .loading-shimmer {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <header class="bg-yellow-400 text-black p-5 sticky top-0 z-50 shadow-md">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black tracking-tighter uppercase">APAVAN</h1>
                <p class="text-[10px] font-bold opacity-70 uppercase tracking-widest">Dose Controlada</p>
            </div>
            <button onclick="openModal()" class="bg-black text-white px-5 py-2 rounded-2xl font-black shadow-md active:scale-95 transition-transform text-sm">
                + NOVO
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <!-- Alertas de Stock e Reposição -->
        <div id="stock-alerts" class="hidden space-y-3">
            <h2 class="text-red-600 font-extrabold flex items-center gap-2 text-lg uppercase tracking-tight">
                <span>⚠️</span> Repor Estoque Agora:
            </h2>
            <div id="low-stock-list" class="space-y-3"></div>
        </div>

        <!-- Lista Organizada por Medicamento -->
        <div class="space-y-4">
            <h2 class="text-slate-900 font-black text-xl flex items-center gap-2 uppercase italic tracking-tighter">
                Planos de Tratamento
            </h2>
            <div id="med-groups-container" class="space-y-8">
                <div class="text-center py-20 text-slate-400 italic font-medium text-sm">A carregar dados...</div>
            </div>
        </div>
    </main>

    <!-- Modal de Registo -->
    <div id="modal-form" class="fixed inset-0 bg-black/60 hidden z-[100] flex items-end sm:items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-t-[2.5rem] sm:rounded-[2.5rem] p-7 space-y-5 max-h-[95vh] overflow-y-auto shadow-2xl">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-black text-slate-900 uppercase italic">Novo Registo</h2>
                <button onclick="closeModal()" class="text-slate-300 text-4xl p-2 hover:text-slate-600 transition-colors">&times;</button>
            </div>
            
            <form id="form-medication" class="space-y-4">
                <div>
                    <label class="block text-indigo-600 font-black text-[10px] mb-1 uppercase tracking-widest">Identificação do Paciente</label>
                    <input type="text" id="patientName" required class="w-full p-4 bg-indigo-50 border-2 border-indigo-100 rounded-2xl text-lg font-bold outline-none focus:ring-4 focus:ring-yellow-400/50 transition-all uppercase" placeholder="NOME DO PACIENTE">
                </div>

                <div>
                    <label class="block text-slate-500 font-bold text-[10px] mb-1 uppercase tracking-widest">Nome do Medicamento</label>
                    <input type="text" id="name" required class="w-full p-4 bg-slate-100 rounded-2xl text-lg font-bold outline-none focus:ring-4 focus:ring-yellow-400/50 border-none transition-all uppercase" placeholder="EX: DIPIRONA">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-slate-500 font-bold text-[10px] mb-1 uppercase tracking-widest">Data Início</label>
                        <input type="date" id="startDate" required class="w-full p-4 bg-slate-100 rounded-2xl font-bold outline-none focus:ring-4 focus:ring-yellow-400/50 border-none transition-all">
                    </div>
                    <div>
                        <label class="block text-slate-500 font-bold text-[10px] mb-1 uppercase tracking-widest">Dose (Ex: 1 comp)</label>
                        <input type="text" id="dose" required class="w-full p-4 bg-slate-100 rounded-2xl font-bold outline-none" placeholder="1 comp.">
                    </div>
                </div>

                <div>
                    <label class="block text-slate-500 font-bold text-[10px] mb-1 uppercase tracking-widest">Stock Inicial (Total)</label>
                    <input type="number" id="stock" required min="1" class="w-full p-4 bg-slate-100 rounded-2xl text-lg font-bold outline-none" placeholder="10">
                </div>

                <div class="bg-slate-50 p-4 rounded-3xl border border-dashed border-slate-200 space-y-3">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Dados do Fornecedor Preferencial</p>
                    <input type="text" id="vendorName" class="w-full p-3 bg-white rounded-xl text-sm font-bold outline-none" placeholder="NOME DO FORNECEDOR/FARMÁCIA">
                    <input type="tel" id="vendorTel" class="w-full p-3 bg-white rounded-xl text-sm font-bold outline-none" placeholder="WHATSAPP (COM DDD)">
                </div>

                <div>
                    <label class="block text-slate-500 font-bold text-[10px] mb-2 uppercase tracking-widest text-center">Frequência Diária</label>
                    <div class="grid grid-cols-4 gap-2">
                        <button type="button" onclick="setFrequency(1)" class="freq-btn border-2 border-slate-200 py-3 rounded-2xl font-black text-slate-400 bg-white" id="freq-1">1x</button>
                        <button type="button" onclick="setFrequency(2)" class="freq-btn border-2 border-slate-200 py-3 rounded-2xl font-black text-slate-400 bg-white" id="freq-2">2x</button>
                        <button type="button" onclick="setFrequency(3)" class="freq-btn border-2 border-slate-200 py-3 rounded-2xl font-black text-slate-400 bg-white" id="freq-3">3x</button>
                        <button type="button" onclick="setFrequency(4)" class="freq-btn border-2 border-slate-200 py-3 rounded-2xl font-black text-slate-400 bg-white" id="freq-4">4x</button>
                    </div>
                </div>

                <div id="time-inputs" class="space-y-3"></div>

                <button type="submit" id="btn-submit" class="w-full bg-yellow-400 text-black font-black py-5 rounded-[1.5rem] text-xl shadow-lg active:bg-yellow-500 transition-all uppercase tracking-widest mt-2 flex items-center justify-center gap-3">
                    GUARDAR TRATAMENTO
                </button>
            </form>
        </div>
    </div>

    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-full shadow-2xl opacity-0 transition-opacity z-[200] font-black pointer-events-none text-center text-sm uppercase"></div>

    <script>
        const apiKey = "";
        let meds = [];
        const STORAGE_KEY = 'cimed_v14_images';

        // --- Funções de API ---

        async function generateMedImage(medName) {
            const prompt = `A clean, professional product photograph of a medicine box labeled "${medName}", pharmaceutical packaging, white background, high quality, studio lighting.`;
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        instances: [{ prompt: prompt }],
                        parameters: { sampleCount: 1 }
                    })
                });
                const result = await response.json();
                return `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
            } catch (error) {
                console.error("Erro ao gerar imagem:", error);
                return null;
            }
        }

        function searchBestPrice(medName) {
            const query = `preço ${medName} farmácia perto de mim`;
            const url = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
            window.open(url, '_blank');
        }

        // --- Lógica da App ---

        function init() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                meds = data ? JSON.parse(data) : [];
                checkDailyReset();
                render();
            } catch (e) { meds = []; }
        }

        function saveAndRender() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(meds));
            render();
        }

        function getPeriodInfo(time) {
            const hour = parseInt(time.split(':')[0]);
            if (hour >= 5 && hour < 12) return { label: 'Manhã', class: 'tag-manha' };
            if (hour >= 12 && hour < 18) return { label: 'Tarde', class: 'tag-tarde' };
            if (hour >= 18 && hour < 24) return { label: 'Noite', class: 'tag-noite' };
            return { label: 'Madrugada', class: 'tag-madrugada' };
        }

        function setFrequency(n) {
            document.querySelectorAll('.freq-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`freq-${n}`).classList.add('active');
            const container = document.getElementById('time-inputs');
            container.innerHTML = '';
            for(let i = 1; i <= n; i++) {
                container.innerHTML += `
                    <div class="card-med">
                        <label class="text-[9px] font-black text-slate-400 uppercase ml-1">Horário da Dose ${i}</label>
                        <input type="time" required class="med-time w-full p-3 bg-slate-100 rounded-xl text-lg font-bold outline-none border-none">
                    </div>`;
            }
        }

        document.getElementById('form-medication').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<span class="animate-spin text-2xl">⏳</span> GERANDO CAIXA...`;

            const medName = document.getElementById('name').value.toUpperCase();
            const timeInputs = document.querySelectorAll('.med-time');
            const groupId = "G_" + Date.now();
            
            // Gerar imagem da caixa
            const imageUrl = await generateMedImage(medName);

            const commonData = {
                groupId: groupId,
                patientName: document.getElementById('patientName').value.toUpperCase(),
                name: medName,
                dose: document.getElementById('dose').value,
                stock: parseInt(document.getElementById('stock').value),
                startDate: document.getElementById('startDate').value,
                vendorName: document.getElementById('vendorName').value || 'CIMED',
                vendorTel: document.getElementById('vendorTel').value || '',
                boxImage: imageUrl,
                takenToday: false
            };
            
            timeInputs.forEach(input => {
                meds.push({ ...commonData, id: "ID_" + Math.random().toString(36).substr(2, 9), time: input.value });
            });

            saveAndRender();
            btn.disabled = false;
            btn.innerHTML = originalText;
            closeModal();
            showToast("✅ MEDICAMENTO REGISTADO!");
        });

        function takeDose(id) {
            const index = meds.findIndex(m => m.id === id);
            if (index === -1) return;
            const gId = meds[index].groupId;
            meds.forEach(m => {
                if (m.groupId === gId) {
                    m.stock = Math.max(0, m.stock - 1);
                    if (m.id === id) m.takenToday = true;
                }
            });
            saveAndRender();
            showToast(`💊 DOSE REGISTADA!`);
        }

        function undoDose(id) {
            if (confirm("Deseja desmarcar esta dose?")) {
                const index = meds.findIndex(m => m.id === id);
                if (index === -1) return;
                const gId = meds[index].groupId;
                meds.forEach(m => {
                    if (m.groupId === gId) {
                        m.stock += 1;
                        if (m.id === id) m.takenToday = false;
                    }
                });
                saveAndRender();
                showToast(`↩️ DOSE CANCELADA!`);
            }
        }

        function deleteGroup(gId) {
            if (confirm("Remover este tratamento completo?")) {
                meds = meds.filter(m => m.groupId !== gId);
                saveAndRender();
            }
        }

        function render() {
            const container = document.getElementById('med-groups-container');
            const alertArea = document.getElementById('stock-alerts');
            const alertList = document.getElementById('low-stock-list');
            container.innerHTML = ''; alertList.innerHTML = '';
            const todayStr = new Date().toISOString().split('T')[0];

            if (meds.length === 0) {
                container.innerHTML = `<div class="text-center py-24 text-slate-300 font-black uppercase tracking-[0.2em] px-10 text-xs">Sem medicamentos ativos.</div>`;
                alertArea.classList.add('hidden'); return;
            }

            // --- 1. Alertas de Reposição com FOTO ---
            const seenGroups = new Set();
            let hasLow = false;
            meds.forEach(m => {
                if (!seenGroups.has(m.groupId) && m.stock <= 5) {
                    hasLow = true;
                    
                    alertList.innerHTML += `
                        <div class="bg-white border-2 border-red-200 rounded-[2.5rem] shadow-sm overflow-hidden card-med">
                            <div class="flex h-40 bg-slate-100">
                                ${m.boxImage ? 
                                    `<img src="${m.boxImage}" class="w-1/2 h-full object-cover" alt="Caixa do medicamento">` : 
                                    `<div class="w-1/2 h-full flex items-center justify-center bg-slate-200 text-slate-400 font-black text-[10px] text-center p-4 uppercase">Foto da Caixa Indisponível</div>`
                                }
                                <div class="w-1/2 p-5 flex flex-col justify-center bg-red-50">
                                    <span class="text-[8px] font-black text-red-400 uppercase tracking-widest mb-1">REPOR URGENTE</span>
                                    <h4 class="font-black text-red-600 text-xl leading-none uppercase italic">${m.name}</h4>
                                    <p class="text-[10px] font-bold text-red-800 mt-2">STOCK: ${m.stock} unidades</p>
                                </div>
                            </div>
                            <div class="p-5 grid grid-cols-2 gap-3 bg-white">
                                <button onclick="searchBestPrice('${m.name}')" class="flex items-center justify-center gap-2 bg-indigo-600 text-white font-black text-[9px] py-4 rounded-2xl uppercase tracking-tighter active:scale-95 transition-transform">
                                    🔍 BUSCAR MENOR PREÇO
                                </button>
                                ${m.vendorTel ? `
                                <a href="https://wa.me/${m.vendorTel.replace(/\D/g, '')}" target="_blank" class="flex items-center justify-center gap-2 bg-green-500 text-white font-black text-[9px] py-4 rounded-2xl uppercase tracking-tighter active:scale-95 transition-transform">
                                    💬 WHATSAPP FARMÁCIA
                                </a>` : `
                                <div class="flex items-center justify-center text-[8px] text-slate-400 font-bold border-2 border-slate-100 rounded-2xl text-center">SEM CONTACTO GUARDADO</div>
                                `}
                            </div>
                        </div>`;
                }
                seenGroups.add(m.groupId);
            });
            alertArea.classList.toggle('hidden', !hasLow);

            // --- 2. Lista Principal ---
            const grouped = meds.reduce((acc, med) => {
                if (!acc[med.groupId]) acc[med.groupId] = { info: med, doses: [] };
                acc[med.groupId].doses.push(med);
                return acc;
            }, {});

            Object.values(grouped).forEach(group => {
                const info = group.info;
                if (info.startDate > todayStr) return;

                const groupCard = document.createElement('div');
                groupCard.className = "space-y-3 card-med";
                groupCard.innerHTML = `
                    <div class="med-group-header bg-slate-900 text-white p-5 rounded-[2.5rem] shadow-lg flex justify-between items-center">
                        <div class="flex items-center gap-4">
                            ${info.boxImage ? `<img src="${info.boxImage}" class="w-12 h-12 rounded-xl object-cover ring-2 ring-yellow-400" />` : ''}
                            <div>
                                <p class="text-[8px] font-black text-yellow-400 uppercase tracking-widest mb-1">${info.patientName}</p>
                                <h3 class="text-xl font-black italic uppercase leading-none">${info.name}</h3>
                                <p class="text-[9px] font-bold text-slate-400 uppercase mt-1">Dose: ${info.dose} • Stock: ${info.stock}</p>
                            </div>
                        </div>
                        <button onclick="deleteGroup('${info.groupId}')" class="bg-white/10 p-3 rounded-full hover:bg-red-500/20 transition-colors">
                            <svg width="18" height="18" fill="white" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                        </button>
                    </div>
                    <div class="grid grid-cols-1 gap-2 pl-4" id="doses-for-${info.groupId}"></div>
                `;

                const doseContainer = groupCard.querySelector(`#doses-for-${info.groupId}`);
                group.doses.sort((a,b) => a.time.localeCompare(b.time)).forEach(dose => {
                    const p = getPeriodInfo(dose.time);
                    const taken = dose.takenToday;
                    
                    const doseItem = document.createElement('div');
                    doseItem.className = `flex items-center gap-4 bg-white p-4 rounded-[1.8rem] border-2 transition-all ${taken ? 'border-green-100 bg-green-50/20' : 'border-slate-100 shadow-sm'}`;
                    
                    doseItem.innerHTML = `
                        <div class="flex-shrink-0 w-14 text-center">
                            <p class="text-[10px] font-black text-slate-900">${dose.time}</p>
                        </div>
                        <div class="flex-1 h-6 border-l border-slate-100"></div>
                        <div class="flex-shrink-0">
                            ${taken ? 
                                `<button onclick="undoDose('${dose.id}')" class="px-5 py-2 bg-green-500 text-white font-black text-[9px] rounded-xl border border-green-600 uppercase">TOMADA ✓</button>` :
                                `<button onclick="takeDose('${dose.id}')" class="btn-confirm px-6 bg-yellow-400 text-black font-black text-[9px] rounded-xl shadow-sm uppercase active:scale-95">TOMAR AGORA</button>`
                            }
                        </div>
                    `;
                    doseContainer.appendChild(doseItem);
                });

                container.appendChild(groupCard);
            });
        }

        function checkDailyReset() {
            const today = new Date().toLocaleDateString();
            if (localStorage.getItem('cimed_day_v14') !== today) {
                meds.forEach(m => m.takenToday = false);
                localStorage.setItem('cimed_day_v14', today);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(meds));
            }
        }

        function openModal() { 
            document.getElementById('modal-form').classList.remove('hidden');
            document.getElementById('startDate').value = new Date().toISOString().split('T')[0];
            setFrequency(1);
            document.body.style.overflow = 'hidden';
        }
        
        function closeModal() { document.getElementById('modal-form').classList.add('hidden'); document.body.style.overflow = 'auto'; }
        
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = `fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-full shadow-2xl transition-opacity z-[200] font-black opacity-100 text-center text-[10px] uppercase`;
            setTimeout(() => t.classList.replace('opacity-100', 'opacity-0'), 2500);
        }

        window.onload = init;
    </script>
</body>
</html>
